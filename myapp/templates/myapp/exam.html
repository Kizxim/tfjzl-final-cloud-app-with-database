<!DOCTYPE html>
<html>
<head>
    <title>Exam - {{ lesson.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>{{ lesson.title }}</h1>
        <form method="post" action="{% url 'myapp:submit' lesson.id %}">
            {% csrf_token %}
            {% for question in questions %}
            <div class="card mb-3">
                <div class="card-header">
                    Question {{ forloop.counter }} ({{ question.points }} points)
                </div>
                <div class="card-body">
                    <p>{{ question.text }}</p>
                    {% for choice in question.choices.all %}
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="question_{{ question.id }}" value="{{ choice.id }}" id="choice_{{ choice.id }}">
                        <label class="form-check-label" for="choice_{{ choice.id }}">
                            {{ choice.text }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">Submit Exam</button>
        </form>
    </div>
</body>
</html>
